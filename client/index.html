<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goose CLI Chat</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    body {
      margin: 0;
      background: #0b0f14;
      color: #e6edf3;
      display: grid;
      place-items: center;
      height: 100vh;
    }
    .app {
      width: min(900px, 95vw);
      height: min(80vh, 800px);
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid #1f2937;
      font-weight: 600;
    }
    .messages {
      padding: 16px 20px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      max-width: 85%;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .user { background: #1d4ed8; align-self: flex-end; }
    .bot { background: #0f172a; border: 1px solid #1f2937; }
    .stderr { background: #7f1d1d; border: 1px solid #991b1b; }
    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid #1f2937;
      background: #0f172a;
    }
    input {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0b1220;
      color: #e6edf3;
    }
    button {
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      cursor: pointer;
    }
    .status {
      font-size: 12px;
      color: #9ca3af;
      padding: 0 20px 12px 20px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>Goose CLI Chat</header>
    <div id="messages" class="messages"></div>
    <div class="status" id="status">Idle</div>
    <form id="chatForm">
      <input id="prompt" type="text" placeholder="Send instructions to Goose..." required />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const ENDPOINT = "http://77.42.88.223:3000/run";
    const messages = document.getElementById("messages");
    const form = document.getElementById("chatForm");
    const promptInput = document.getElementById("prompt");
    const statusEl = document.getElementById("status");

    function addMsg(text, cls) {
      const el = document.createElement("div");
      el.className = `msg ${cls}`;
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function runGoose(instructions) {
      setStatus("Running...");
      addMsg(instructions, "user");

      const res = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ instructions })
      });

      if (!res.ok || !res.body) {
        setStatus("Error");
        addMsg(`Request failed: ${res.status}`, "stderr");
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let idx;
        while ((idx = buffer.indexOf("\n\n")) !== -1) {
          const chunk = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);

          let event = "message";
          let data = "";

          for (const line of chunk.split("\n")) {
            if (line.startsWith("event:")) {
              event = line.slice(6).trim();
            } else if (line.startsWith("data:")) {
              data += line.slice(5) + "\n";
            }
          }

          data = data.trimEnd();
          if (!data) continue;

          if (event === "stdout") addMsg(data, "bot");
          else if (event === "stderr") addMsg(data, "stderr");
          else if (event === "end") setStatus(`Finished (${data})`);
        }
      }

      setStatus("Idle");
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const instructions = promptInput.value.trim();
      if (!instructions) return;
      promptInput.value = "";
      runGoose(instructions).catch((err) => {
        setStatus("Error");
        addMsg(err.message, "stderr");
      });
    });
  </script>
</body>
</html>
